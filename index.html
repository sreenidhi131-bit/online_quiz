<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Quiz Platform</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- LOGIN -->
    <div id="startScreen">

        <h2>🎓 Online Quiz Platform</h2>

        <input
            type="text"
            id="username"
            placeholder="Enter Username"
        >

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
        >

        <button onclick="signup()">
            Sign Up
        </button>

        <button onclick="login()">
            Login
        </button>

        <p id="authMessage"></p>

    </div>


    <!-- DASHBOARD -->
    <div id="dashboardScreen" class="hidden">

        <h1>👋 Welcome</h1>

        <h2 id="dashboardUser"></h2>

        <div class="dashboard-box">

            <p id="totalBranches">
                📚 Total Categories : 0
            </p>

            <p id="lastScore">
                🏆 Last Score : 0
            </p>

            <p id="bestScore">
                ⭐ Best Score : 0
            </p>

        </div>

        <button onclick="openCategories()">
            Start Quiz
        </button>

        <button
            onclick="logoutUser()"
            class="logout-btn"
        >
            Logout
        </button>

    </div>


    <!-- COURSE SCREEN -->
    <div id="courseScreen" class="hidden">

        <h2>Select Course</h2>

        <button onclick="selectCourse('UG')">
            UG Course
        </button>

        <button onclick="selectCourse('PG')">
            PG Course
        </button>

        <button onclick="goDashboard()">
            ⬅ Back
        </button>

    </div>


    <!-- BRANCH SCREEN -->
    <div id="branchScreen" class="hidden">

        <h2 id="branchHeading">
            Select Branch
        </h2>

        <div id="branchButtons"></div>

        <button onclick="backToCourse()">
            ⬅ Back
        </button>

    </div>


    <!-- SUBJECT SCREEN -->
    <div id="subjectScreen" class="hidden">

        <h2 id="branchTitle"></h2>

        <div id="subjectButtons"></div>

        <button onclick="backToBranches()">
            ⬅ Back
        </button>

    </div>


    <!-- QUIZ SCREEN -->
    <div id="quizScreen" class="hidden">

        <div class="top">

            <span id="progressText"></span>

            <span id="timer">
                ⏱ 30s
            </span>

        </div>

        <div class="progress-bar">

            <div id="progressBar"></div>

        </div>

        <h3 id="categoryTitle"></h3>

        <h2 id="question"></h2>

        <div class="options">

            <label for="a">
                <input
                    type="radio"
                    name="answer"
                    id="a"
                >
                <span id="a_text"></span>
            </label>

            <label for="b">
                <input
                    type="radio"
                    name="answer"
                    id="b"
                >
                <span id="b_text"></span>
            </label>

            <label for="c">
                <input
                    type="radio"
                    name="answer"
                    id="c"
                >
                <span id="c_text"></span>
            </label>

            <label for="d">
                <input
                    type="radio"
                    name="answer"
                    id="d"
                >
                <span id="d_text"></span>
            </label>

        </div>

        <button onclick="submitAnswer()">
            Submit Answer
        </button>

    </div>


    <!-- RESULT SCREEN -->
    <div id="resultScreen" class="hidden"></div>

</div>

<script src="script.js"></script>

</body>
</html>
